草六分茯苓皮三錢白朮三錢神麯三錢茅根五錢青廣皮各錢半嘔門病因痰飲內聚胃氣不得舒降木氣為濕土所郁漸至化風生火其嘔吐痰沫大便溏閉不時氣逆頭痛諸病概由乎此左脈弦細而數右寸關浮搏而數肺胃之氣為木火所沖激不特上逆為嘔抑且掣及經絡兼以陰虛之質木火易燃故有內熱口渴之證溫中蠲飲自屬正治但於陰虛肝熱者恐有劫陰之弊擬仿喻氏關格治例肝胃兩調寒熱互用冀得通降為吉細川連吳萸一分炒乾薑淡芩桂枝洋參白芍金鈴子瓦楞子半夏枳實茯苓薑皮竹茹濁飲內蓄嘔吐酸濁甚則吐水黃色飲久成癖木鬱生火當溫中疏木通導濁積俾得下行為順乾薑半夏廣皮茯苓苡仁白芥子枳實桃仁於術秦艽雞距子生甘草另控涎丹每服一錢七分開水送下濁陰夾木火鬱而上逆在胃為嘔在肺為咳病歷年餘痰黏內熱濁蘊陰傷不堪燥劑姑與清肝泄濁肅降肺金茵陳苡仁旋覆花半夏茯苓黑山梔川連杏仁冬瓜仁海浮石瓦楞子枇杷葉脘塊撑痛上嘔下瀉糞色瘀黑嘔吐痰涎舌苔晦白中氣虛寒而煩躁絞疼肝木鬱化為火又非純用溫燥所宜此病所以難治也姑兩和之細川連乾薑三分炒半夏金鈴子川鬱金小青皮枳實黑梔皮烏梅炭瓦楞子白芍桂枝蘇葉石菖蒲竹二青再診絞嘔未止木火挾痰濁蒙擾不降仍宜苦辛疏化細川連淡乾薑薑半夏廣皮茯苓黑山梔白芍石決明烏梅炭金鈴子肉延胡丹參竹二青噯噦門噯噦不止起於病後此肺胃之氣為痰濁所阻升降不得自如仿仲景噯氣例治之旋覆花代赭石黨參炙草半夏白蔻仁細川連乾薑二分拌炒杏仁枳殼竹二青再診噯噦減而未止胃氣內虛失靜鎮之常不能勝風木之沖激仍仿噫氣例增入培土之意黨參炙草茯苓廣皮半夏蔻仁沉香旋覆花代赭石桂丁子沖枇杷葉噯噦硬噎納穀撑脹右脈弦硬肝胃氣鬱逆而不降旋覆花代赭石鬱金枳殼半夏廣皮瓜蔞皮前胡蔻仁蘇梗枇杷葉噦氣衝逆喉間如炙臠木氣鬱結阻於肺部當泄木降肺法治之旋覆花代赭石鬱金丹參川朴枳殼杏仁川百合瓜蔞皮蘇梗佛手枇杷葉木火較平而氣阻不暢脘復升逆上窒於喉病與梅核氣相似用清火降氣法旋覆花鬱金青皮黑梔薑汁炒蘇梗瓦楞子鹽水煅枳實半夏橘絡杏仁前胡蔞皮枇杷葉竹茹再診核阻雖通而氣未暢近增寒熱脘悶時邪挾發於中焦仍當疏氣和中為主豆豉卷黑梔蘇葉淡芩苓皮枳殼杏仁鬱金橘絡通草香櫞皮竹二青肝氣上逆肺氣不降胃氣被其搏激失其通降之常噯噦不已納穀哽噎脈形滑而神不爽前醫謂痰氣相搏信然但治痰必先理氣擬與通降肺胃佐以疏肝化痰旋覆花薤白鬱金蔞皮枳殼法半夏橘紅象貝前胡川百合竹茹枇杷葉另桂丁香三分白蔻仁三分研末沖服噎膈門木鬱傷胃胃氣不得通降痰瘀交阻為噎為膈氣短便堅咽喉鯁痛膈症已成調復不易白芍川連吳萸炒乾薑半夏淡芩瓦楞子殼桃杏仁丹參歸尾鬱金紫菀旋覆花代赭石竹二青肝胃不和之病久則胃氣空虛痰濁內阻谷納脹悶作嘔不得下降大便堅少漸有膈證之象兼以肝氣竄入絡脈腰腹撑痛氣病及血癸水不調當與通降胃氣為主而和營泄肝則兼顧及之桂枝乾薑半夏茯苓白芍川連吳萸三分煎汁拌炒青皮枳實金鈴子肉延胡丹參旋覆花烏梅炭竹二青再診脾為木克則脹滿胃為木克則痛嘔理固然也此病谷納痛悶欲嘔不得大解旬日不行胸膈氣窒不快胃氣為肝木所激失順降之常因之痰濁上阻中陽痞塞大有延成膈證之勢前方用苦辛溫降似亦偏燥茲擬專以泄木清胃為法望其腑氣下行則上中得以疏暢矣川石斛枳實半夏洋參橘紅白茯苓青皮白芍川連吳萸炒瓜蔞皮干薤白竹茹檀降香香櫞皮三診大便通降胃氣得以下行故納穀漸增脈象左弱右弦腹中撑痛頭眩耳鳴癸水愆期此皆肝氣不和氣病則營窒而化火生風一切肝木之病連類而起治法當疏肝暢營為主歸鬚白芍丹參丹皮川楝子瓦楞子延胡青皮刺蒺藜甘菊花橘絡橘核烏藥檀降香納穀脹悶胃為痰氣所阻不得舒降病久液枯便難舌燥已成關格之候用喻氏黃連合大半夏法川連淡芩乾薑洋參半夏生草青皮白芍桂枝三分炒蔞皮枳實白蜜沖竹茹香櫞脘痛當心甚則肢厥嘔水不能安穀大便艱澀始由肝氣不和久而氣瘀交阻脈象弦細而數舌色偏紅木火內燃胃陰漸涸已屬關格重候姑與泄肝養胃疏暢氣瘀然必寬懷調理方能奏效旋覆花代赭石瓦楞子川連吳萸三分炒烏梅炭鬱金歸鬚丹參桃杏仁紫菀金石斛白芍乳香橘葉竹二青方按此等病余常用龍薈丸直泄肝經氣火屢得效驗痛嘔較減但木火久逆胃中氣液兩傷而痰瘀所阻未必遽能疏化脈弦軟無力不能安寐仍從胃腑清養疏降佐以和肝洋參金石斛丹參半夏廣皮黑梔仁茯神枳實金鈴子延胡左金丸白芍川百合香櫞竹茹脘中痛脹朝食暮吐兼帶酸濁脈象弦數四末不溫木火內燃中陽不運由肝氣而成反胃正屬難治姑仿喻氏關格治法淡乾薑白芍桂枝四分炒川連吳萸一分半炒半夏瓦楞子川楝子川鬱金烏梅炭青皮雞內金檀降香竹茹肝木逆犯肺金氣嗆哽噎發則呵欠氣厥病由痰氣上阻法當疏降旋覆花瓦楞子鬱金蘇梗鹽半夏橘紅枳殼川貝前胡桑皮枇杷葉沉香烏藥二味磨沖脹痛嘔惡不能納穀病由肝木犯胃胃氣不得舒降將成枯膈之候北沙參川連乾薑瓦楞子青皮白芍木瓜半夏廣皮鬱金枳實茯苓竹茹香櫞痹門胸氣痹窒上迫於肺脈象左虛右弦舌苔黃膩雖屬宿病而兼挾新邪以疏降肺氣為主干薤白瓜蔞皮旋覆花鬱金杏仁前胡鹽半夏枳殼紫菀通草枇杷葉方按合參案方大約有咳嗽等見證當胸氣窒狀如胸痹此由肝氣逆行肺絡不能清降脈象弦數木鬱生火也仿金匱法佐以清肝旋覆花薤白蔞皮鬱金前胡川貝黑梔仁丹皮歸鬚橘絡瓦楞子竹茹枇杷葉痰氣阻結清陽被郁脈數舌黃兼有濁熱蒙擾當宣痹泄濁旋覆花薤白頭瓜蔞皮鬱金前胡杏仁香豉射干枳殼橘紅蔻仁通草枇杷葉方按既有濁熱宜加山梔痰氣阻於上焦木火內閉不得疏泄上則暈眩氣噎下則夢遺精濁肺俞獨冷痰阻而陽氣不通也法當化痰暢氣泄木清火旋覆花鹽半夏橘紅桂枝白芍於術茯苓茯神川柏砂仁牡蠣竹茹生薑再診木火為痰氣所阻不得疏越背惡寒而胸氣窒再與通陽泄濁肅肺暢氣旋覆花薤白鬱金前胡全瓜蔞鹽半夏桂枝於術茯苓苡仁枳殼生薑竹茹臌脹門脘腹脹滿半載於茲據述其來無因而亦無苦脈象弦細滑數舌苔白膩想由寒濕內著肝脾之氣窒而不化痰涎濁沫隨氣而結病情與單腹無異擬方用溫化法疏運肝脾俾濁陰之氣得以疏達乃松野於術炒鬆一錢山茅朮生切一錢淡乾薑鹽水炒五分廣皮一錢五分制附片八分法半夏一錢五分茯苓皮四錢澤瀉一錢半潞黨參炒鬆二錢青皮醋炒一錢半廣木香七分香櫞皮錢半另禹餘糧丸三錢廣皮湯下方按細繹病情徹底澄清用藥亦虛實兼到切實不浮然據此脈象是氣陰兩傷所致非必定有濁熱先生之用薑附是從證不從脈也肝氣鬱陷發熱甚於兩足此即邪鬱於厥陰之兆其外達也不能從經絡疏透而又內陷於脾挾時令之暑濕泄瀉數日轉為腹脹脹勢甚於少腹兩便通而不爽仍屬木陷土鬱之象惟脈象軟細而不弦舌色乾紅而少潤氣液兩虧藥難著手姑擬肝脾兩疏録方於後擬方用四逆散合雞金胃苓之意細柴胡醋炙六分白芍土炒二錢枳實薑汁炒八分炙雞金一錢半奎砂仁八分連皮苓四錢本山術一錢川朴八分青皮一錢半烏藥一錢青廣木香各五分沉香磨沖四分香櫞皮一錢另小溫中丸三錢禹餘糧丸二錢肝氣撑痛甚則肢冷發厥木陷於脾脘腹僵硬兼挾濁積內阻有單腹之慮姑與疏肝和脾佐以溫化金鈴子肉酒炒二錢延胡醋炒一錢半青皮醋炒一錢半廣木香七分雞內金一錢半楂炭三錢川朴一錢砂仁研八分萊蔔子炭三錢茯苓皮四錢白芍土炒一錢半香櫞一錢半另禹餘糧丸二錢當脘脹滿不能納穀木陷於脾防其漸成脹病白芍青皮鬱金木香川朴茯苓皮枳實降香麥芽六曲通草佛手熱病後餘熱未清因氣機不暢肝胃不和脹悶不能納穀舌色不營肝脾兩窒久延恐成虛脹白芍青皮沉香曲雞內金枳殼紫蘇細梗青蒿丹皮白薇川石斛歸身香櫞脾胃之氣窒而不行濁氣上升肺氣不降喘逆腹脹不能納穀當與和中為主佐以疏肝肅肺沉香曲枳殼半夏砂仁金鈴子肉延胡青皮白芍旋覆花通草香櫞皮另小溫中丸每服三錢肝脾積熱氣血兩窒脘腹脹滿時吐清水漸至脹及少腹經水亦停脈象澀數不暢病因肝木犯土而起當舒懷調治乃得全愈細川連吳萸二分煎汁炒四分東白芍土炒一錢半小青皮醋炒一錢大川芎炭八分淡乾薑五分川朴一錢製半夏一錢半廣陳皮一錢茯苓皮四錢大腹皮二錢沉香片八分香櫞皮一錢另小溫中丸每服三錢廣皮湯下方按用川芎一味疏動其營血甚妙肝木內犯塊痛撑脹恐其土被木賊漸致中滿擬方泄木調氣金鈴子一錢半延胡醋炒一錢半青皮醋炒一錢半廣木香七分上沉香七分奎砂仁研八分雞內金炙一錢半楂炭三錢廣鬱金一錢九香蟲一錢另加味左金丸每服三錢佛手湯送下腹脹復發當脘塊撑納穀愈甚肝木犯脾脾氣不能輸運也濁蘊氣阻法當疏肝運脾白芍青皮香附金鈴子延胡黑山梔薑汁炒川朴廣皮茯苓皮木香砂仁陳香櫞另小溫中丸每服一錢半土虛木乘左脅撑脹脈細弱舌白中陽不能鼓運氣阻痰凝最易陷成單脹用溫中泄木法金鈴子延胡青皮桂枝白芍吳萸川連三分煎汁炒木瓜廣皮茯苓皮於術砂仁香櫞方按宜加川朴肝木侮中撑痛脹悶脈象細軟而弦舌苔黃濁濁壅氣阻恐延腹脹之候擬用泄木和中調氣泄濁之法川楝子延胡青皮白芍木瓜川連乾薑二分炒小川朴廣皮茯苓皮砂仁焦六曲枳實香櫞咯紅雖止而脘脹不減不能納穀脈象軟細不暢肝脾之氣阻窒不化法與疏木和中老年病久不易奏效白芍青廣皮雞內金砂仁六曲枳實大腹皮茯苓皮通草香櫞皮另小溫中丸每服三錢廣皮湯下脹減而仍作痛脾氣未能舒調也近日形寒晚熱少汗脈形虛數肝脾陰氣內虧姑與和中法歸身白芍丹皮青蒿白薇蛤殼川貝雞內金廣皮木香砂仁香櫞再診中焦脾胃之氣必藉木氣以鼓運甲木不得疏達有陷於中土而為脹為痛其寒熱往來亦屬少陽不和之證刻下寒熱雖止而木土未和腹中尚痛況內熱唇乾中焦積熱留戀尚宜疏木和中清泄裡熱霍石斛銀柴胡連翹殼淡芩枳實白芍小青皮炙雞金茯苓皮木香砂仁神麯通草穀麥芽乾荷葉肝脾相忤痛減而脹增向晚更甚中陽困敗濁氣壅阻恐其延成單腹姑與泄木和中白芍青皮蘇梗木香砂仁雞內金腹皮六曲杏仁前胡橘紅香櫞皮另小溫中丸每服三錢開水下脘右結痞納穀則臍下作脹左脈微弦右脈細弱舌苔濁膩病因肝氣下陷脾氣不能輸運濁積停阻將成腹脹之候金鈴子延胡柴胡青皮廣皮川厚朴神麯砂仁苡米赤苓通草香櫞皮方按宜加枳實以泄濁病後氣機不化肢面浮腫而脘腹脹甚脈象細澀不暢當通降脾肺疏泄肝木豆卷杏仁蘇梗木香雞金鬱金青皮腹皮苓皮冬瓜皮沉香曲香櫞皮筋青臍突脹勢已深且自下而上病關肝腎尤為重候姑與溫中暢氣冀其稍松而已茯苓皮青廣皮桑白皮瓜蔞皮桂心去皮研末作丸吞服豬苓澤瀉雞金砂仁木香平胃散絹包入煎香櫞皮另小溫中丸每服三錢廣皮湯送下腹脹筋青脈弦細而數脅左結瘕病由肝木鬱陷脾氣阻結而濕鬱化熱木鬱化火阻窒不達中陽抑遏不暢雖在髫年而病挾情志調治頗非易易擬疏木和中法川楝子延胡青廣皮左金丸桂枝白芍雞金苓皮黑梔薑汁炒另小溫中丸再診前與疏木清濕腹脹減而復作脈象虛弦無力此由中氣受傷脾土無自立之權故病勢旋平旋發擬於前法中參用培益中陽之品標本兼治庶幾漸瘳生於術炮乾薑桂枝白芍左金丸青皮川楝子川鬱金醋炒黑梔木香桑白皮廣皮茯苓皮通草竹二青香櫞三診腹脹漸平但肝脾以久病而損肝傷則生氣被困脾傷則健運不及疏肝運脾疏補兼用為善後之計生於術炮乾薑桂枝白芍細川連吳萸二分同炒青皮雞內金廣木香砂仁神麯車前子杏仁枳實淡芩肝木傷脾復挾濕濁阻結不化腹脹硬腫及於四肢有脹甚為鼓之慮半夏廣皮茯苓皮金鈴子延胡萊蔔子青皮白芍沉香曲木香佛手另小溫中丸每服三錢開水送下木鬱傷脾脘腹臌脹氣逆自促不能納穀臟氣窒而不通此屬氣臌重症金鈴子青皮白芍川鬱金香附蘇子梗青廣木香沉香旋覆花前胡香櫞另小溫中丸瘧邪內陷邪積交阻致周身腫脹咳逆氣喘由脾土傷及肺金病經數月邪實正虛此瘧鼓中難治之證茯苓皮大腹皮桑白皮青廣皮瓜蔞皮雞內金萊蔔子白芥子桂枝杏仁通草冬瓜皮枇杷葉薑皮另小溫中丸腹脹如鼓小水不利似屬濕熱為病但脈象左關不和右手按之弦而數硬曾經吐瘀便黑脹勢稍減仍增此由肝氣內郁氣聚則血凝復挾木邪乘土脾傷濕壅與痹病濕熱者不同所慮臟氣內窒難必其行動有權耳延胡青皮桃仁歸鬚苓皮廣皮木香枳實黑梔通草另小溫中丸二錢開水送下西珀屑三分錦紋大黃合紅花酒製八分為末廣皮湯下經阻數年漸覺腹脹如鼓脈象細而數營氣內窒肝陽浮越此屬瘀脹重證延胡青皮歸尾桃仁丹參香附楂炭平胃散大腹皮炒枳實奎砂仁石決明木蝴蝶香櫞皮再診腹脹膚錯屬瘀脹重證病歷數年根底已深不敢遽投攻泄於暢營中佐以和氣亦血病治氣之旨歸尾桃仁丹皮丹參細生地紅花三分炒生草延胡香附木香桂枝廣皮益母草另婦科回生丹一粒藥汁化服瘀血嘔而未盡轉見腹大筋青納穀作脹左關弦數而硬營氣久窒不得通調病屬血臌重症姑與暢肝疏瘀丹參延胡桃仁歸尾香附青皮木香蘇梗長牛膝九香蟲紅花炙乳沒參三七磨沖香櫞再診前與暢肝疏瘀大解頻見紫黑漸得脈軟脹松於病情尚有轉機但瘀未全化即病根未動仍以前方增損全當歸白芍澤蘭延胡丹參桃仁香附青皮木香楂炭砂糖拌炒長牛膝紅花三分煎汁炒參三七香櫞皮中氣虛疲脾陽不運神色不榮嘔脹遺溲此屬本原不足兼受濕邪之象調治甚難奏效於術茯苓半夏廣皮木香砂仁苡仁白芍桂枝三分炒乾薑益智仁蓮子生薑再診濕邪漸化但脾氣疲乏已甚納穀作脹法當以溫中疏化為主於術茯苓川朴砂仁雞內金炮薑六曲淡芩豆卷通草香稻葉三診濕邪漸化故舌濁漸退但足膝無力脾氣不運納穀作脹悶仍當疏運中氣苓皮腹皮白芍砂仁枳實淡芩豆卷六曲橘白苡仁通草香稻葉腫門膚腫無汗風水相搏表氣不通當用前人開鬼門法以理脾肺蜜炙麻黃四分白杏仁三錢紫蘇葉一錢半大豆卷四錢廣皮一錢半漢防己一錢半大腹皮二錢茯苓皮四錢小青皮一錢桑白皮一錢半川通草冬瓜皮六錢薑皮三分周身膚腫起於瘧後數月不愈脈象右寸關浮數而硬此肺脾兩經之氣失於舒運所致用五苓五皮合香蘇法茯苓皮青廣皮桑白皮川桂枝野於術澤瀉豬苓香附蘇葉杏仁通草冬瓜皮薑皮再診膚腫得退惟病起瘧後脾氣先虛法當健脾疏運野於術炙雞金東白芍川桂枝淮山藥廣皮茯苓皮豬苓澤瀉桑白皮通草砂仁冬瓜皮薑皮濁熱蒸郁脾病及肺咳痰帶紅氣逆面浮肢腫脈象細數當肺脾兩調而以清降為主茯苓皮大腹皮廣陳皮桑白皮瓜蔞皮冬瓜皮砂仁神麯蘇子杏仁旋覆花茅根肉枇杷葉鮮藕兩足浮腫膚裂出水經絡中所蘊之痰濕盡注於下橫決而出於病機尚屬通順惟小溲短少腎與膀胱氣化不旺不能通調水道致三焦失決瀆之司而水濕之邪因之壅溢金匱痰飲門中以五苓散與腎氣丸並列一以治膀胱一以治腎虛實兼到矣痰氣上逆行動則喘逆愈甚亦屬飲邪內阻腎氣不能攝納所致其上下脾肺之氣亦因濕阻而不能通運故納食之後必捶背數通乃得舒降也擬用五苓合五皮法野於術茯苓皮澤瀉桂枝半夏冬瓜皮廣皮桑白皮淮牛膝砂仁牡蠣銀杏肉五味乾薑三分同打蜜拌炙黑通草另金匱腎氣丸每服三錢臨臥開水下再診腫勢趨於兩足水流不止周身痰濕均藉此為出路本無止澀之理亦無止澀之法惟脾腎兩虧腎陽虧不能蒸化水濕小便因之不利脾陽虧中氣則隨濕下陷跗腫因之不消權衡於邪正之間不患痰濕之不去而慮正氣之不支固本之道不外溫腎培脾仍擬用腎氣丸日服三錢培脾之法另方附後潞黨參野於術茯苓皮炙甘草鹽半夏廣皮淡乾薑川連二分炒五味桂枝牡蠣車前子生熟苡仁銀杏肉胡桃肉脾虛濕鬱中氣不運浮腫自足而起上及首腹於法為逆當與溫中泄脾俾氣機得暢為佳桂枝白朮苓皮青廣皮桑白皮大腹皮雞內金奎砂仁神麯車前子澤瀉杏仁冬瓜皮薑皮再診腫由足起本屬重證中焦濕鬱化熱而小溲不黃熱蘊於裡不得宣達先與疏泄茵陳黑山梔豆卷連翹殼茯苓皮白朮腹絨雞內金神麯砂仁澤瀉黃柏冬瓜皮薑皮腫病自足而起濁氣不降上逆於肺病起於陰所謂下行極而上腫病中最重之證姑與疏降溫攝桑白皮蘇子紫菀製半夏麥冬白芍茯苓皮枳實沉香金匱腎氣丸四錢入煎氣血兩窒周身浮腫病起産後已歷兩年脈虛少納內熱無汗勢必陷成腫滿姑與和中法於術桂枝歸鬚川芎香附蘇梗桑皮雞內金廣皮砂仁木香香櫞皮枇杷葉中氣不化濁邪下注腫從足跗而起上延脘腹脈弦數舌光白宜和氣泄濁白朮川朴苓皮廣皮大腹皮枳殼桔梗藿梗神麯生草冬瓜皮香櫞皮荷葉另保和丸每服三錢面浮略退中氣失於調暢脈象左軟右弦濕邪留滯仍當疏暢白芍桂枝於術茯苓皮大腹皮桑白皮廣皮雞內金神麯廣木香焦穀麥芽冬瓜皮荷葉崩漏之後轉為膚腫四肢膺乳脹及脾肺之分氣升息喘不得平臥血病而及於氣下病而及於上在病機中屬最重之候天氣暑炎經來如黃水脾土漸壞先與清調全當歸丹參鬱金野於術茯苓皮大腹皮桑白皮瓜蔞皮杏仁象貝苡仁川通草枇杷葉香櫞皮再診膚腫或減或劇甚則撑及胸乳肝木陷於脾中脾土漸傷病及肺金氣機升逆當與疏化茯苓皮桑白皮大腹皮青廣皮瓜蔞皮蘇子葉丹參香附橘核雞內金冬瓜皮枇杷葉薑皮陰經為寒濕所附由跗腫而上及腿腹脈象細數不鼓病底頗深經氣不旺調治非易先擬培土溫經之法野於術桂枝茯苓皮淮牛膝製附子三分煎炒椒目獨活防己全當歸苡仁砂仁通草桑枝膚脹屬乎脾肺而此證氣由上逆撑及頸項墳起有形納穀脹悶病因肝氣上逆肺胃不得舒降與尋常浮腫不同用疏肝降氣法白芍木瓜白芥子象貝旋覆花沉香杏仁鬱金蘇子梗青皮桑白皮瓜蔞皮橘絡黑山梔竹二青香櫞再診上部氣機略鬆水濕注陷於下少腹兩足腫甚而陽氣不化法當溫通桂枝椒目苓皮澤瀉於術杏仁青皮大腹皮豬苓砂仁蘇葉金鈴子通草薑皮瘕癖門邪結於厥陰之絡寒熱經久左脅瘕撑作脹病歸陰絡一時不易清徹況營瘀氣阻木土相仇慮其漸成瘕脹歸尾川芎炭赤白芍川楝子延胡沉香曲瓦楞子青蒿生鱉甲丹皮丹參白薇香櫞茅根另鱉甲煎丸每服十粒黃酒送下腹塊撑痛將及半載病引經絡氣窒血阻凡瘕痛歷久化熱亦能壅而成膿脈象細數形寒內熱痛處著於左旁擬與暢氣通瘀疏調營絡取通則不痛之意歸尾赤芍桃仁金鈴子延胡香附橘絡桂枝蘇梗丹皮紅花乳香降香絲瓜絡脘右瘕撑作痛宿病劇發脈弦而遲法當溫通氣分佐以泄降半夏杏仁鬱金桂枝白芍歸鬚蘇梗金鈴子吳萸川連炒枳實通草佛手再診瘕疼略減而足熱頭暈中虛而木火浮注之象脈象仍覺弦遲用建中泄木法白芍桂枝四分炒茯苓半夏生草刺蒺藜石決明甘菊青皮丹皮炭牛膝炭竹二青三診足熱頭暈木火上浮下注雖瘕疼較減而中氣仍復虛窒建中泄木是一定治法白芍生草歸身丹皮白薇鬱金青皮石決明穭豆衣甘菊茯神竹茹佛手脘右瘕聚即屬肝氣內結之病木鬱化火則為熱汗脾土受克則為脹悶其內熱帶下腰痛諸證脾營虛陷所致刻下先擬疏肝和脾俟脹痛稍松再圖治本白芍吳萸二分炒川鬱金丹參全當歸刺蒺藜香附木香砂仁雞內金青皮菟絲子木蝴蝶土木相忤少腹瘕痛上及於脘更兼帶下淋瀝腰脊痠痛小便艱澀脾腎交虧濕熱乘虛下陷病情紛錯先宜和肝運脾疏利濕濁川楝子延胡歸鬚白芍橘核丹皮黑山梔茯苓川柏砂仁木香牛膝吳黃三分炒杜仲陳香櫞皮瓦楞子殼再診瘕痛稍緩但帶下尤甚先期鼻衄脾虛氣陷濕熱下注於奇經土敗木鬱肝火上浮血從清道而溢又當兼清木火生地炭歸身炭白芍青皮丹皮川鬱金黑山梔於術砂仁川柏牡蠣穭豆衣橘核橘葉竹二青院中瘕痞攻衝作脹脈象弦長而數病由肝木乘土而起胃虛則汗出頭暈此木火化風也於泄木中當兼培土白芍青皮木瓜沉香曲木香枳殼半夏於術川石斛麥冬香櫞皮方按宜加牡蠣張脘左痞結數年不消發則寒熱痛脹不納不飢脈象浮弦搏指不耐重按中陽已耗不堪攻伐姑與疏中化氣法青皮橘核川楝子川芎通草廣鬱金川朴蘇梗楂炭白芍瓦楞子半夏香櫞再診脈象浮搏較和痞痛較減惟宿瘕不化中氣久傷不堪攻伐再與兩和肝脾法漸漸疏化川桂枝青皮蘇梗橘核白芍瓦楞子川朴黑山梔川鬱金蔻仁白芥子佛手某脘右瘕痞不化舌紅脈虛數氣病久結陰液漸傷正氣漸削未便攻伐姑與暢氣調營勉期松展白芍鬱金香附通草枳殼紫丹參大腹絨北沙參橘絡歸鬚木香橘核再診胃氣略醒精神稍振但脈仍虛而脘中瘕結不化勢難攻消姑先養胃暢氣以扶正為主太子參歸鬚麥冬鬱金半夏橘絡白芍石斛瓦楞子枳殼青皮某肝木不調左腹結痞久而營氣漸弱氣散火升為眩暈惕悸嘈雜脘脹皆風木傷中之象最慮中氣日削漸成腹滿之候先擬和木熄風培中暢氣石決明川連吳黃炒半夏鬱金香櫞白芍木香砂仁茯神歸身刺蒺藜穭豆衣麥冬竹茹瘀血門唇舌紫暗幼時已然近來爪甲色青營血凝澀已甚年已及笄癸水不通而便下瘀紫黑血甚多少腹絞痛衝脈之氣逆升於上脈象細澀而數營阻血瘀非溫養疏通不能奏效病經十載難冀速功全當歸白芍紅花延胡丹參牛膝吳萸三分煎汁拌炒烏藥香附川斷絲瓜絡降香再診瘀血上吐下瀉近日多吐氣逆脈象左手弦硬右手細數爪甲唇舌紫黑較前稍活惟氣火上逆目紅喘促血之壅滯者尚未流通仍當和營導瘀佐以通降之法伸得下行為順歸尾赤白芍長牛膝紅花八分炒楂肉延胡丹皮丹參生地炭乳香旋覆花降香同包代赭石蘇木茺蔚子另錦紋大黃酒煮六分西珀屑三分二味研末沖服血從上下而溢血色瘀紫血行後筋骨掣痛內及脘腹營絡仍復不通左脅結痞亦未消化總由營絡窒滯肝氣內阻仍宜疏肝和絡清導余瘀金鈴子延胡青皮歸尾牛膝紅花桃仁丹參鬱金木通乳香降香絲瓜絡腰俞延及左脅掣刺作痛難於轉側此血絡瘀傷之病脈軟數時有內熱陰氣暗傷當兼滋養大熟地全當歸杜仲川斷甘杞子菟絲子沙苑子金毛脊破故紙長牛膝旋覆花紅花四分同包胡桃肉另參三七四分血竭二分乳香一分研末陳酒沖服少腹偏左注痛引及腰脊寒熱連綿此病因血絡瘀阻邪機下注熱久陰虧舌紅脈數姑與和絡暢營疏通邪滯金鈴肉延胡歸尾桃仁青蒿白薇丹皮丹參牛膝吳萸炒橘絡橘核木香益母草經阻兩年而無他病近數日來大小便滯痛不爽兩足腫痛不舒病由營血瘀室經絡不暢氣機痹窒姑先溫營疏暢丹參歸尾澤蘭桃仁牛膝紅花三分炒廣鬱金楂炭杏仁桂枝蘇梗香附降香琥珀末沖服崩漏門漏血不止血不歸經所致脈左弦右弱肝木不調腹中撑墜法當條木攝營兼固奇脈全當歸東白芍小青皮木香砂仁炙草川斷肉厚杜仲蘄艾陳阿膠蒲黃末一錢拌炒茜草炭荷葉炭益母草癸停三月而作崩漏下焦有瘀可知三四日來崩勢已減尚覺淋瀝不斷從前上中焦肝氣撑迫塊痛因此均得暢泄則不特肝瘀從此疏達並肝氣亦從此泄降於病機頗為順利惟少腹尚覺牽掣不和此必有餘瘀留滯致營絡之氣未得調暢宜養營固奇和絡調氣乘此營血鬆動之機加意調理可使從前宿疾一切掃除矣其善自調攝為主全當歸白芍生地炭丹參丹皮川斷杜仲茜草炭阿膠蒲黃炒橘核橘絡石決明砂仁香附另參鬚雞血藤膏各一錢二味另煎沖服經漏數月不已由瘀紫而轉為鮮淡脈象細軟帶數腹痛止而腰脊痠病象由實而虛當滋養營血固攝奇脈生地炭歸身白芍茜草炭牡蠣阿膠蒲黃炒川斷肉菟絲餅烏鰂骨甘杞子沙苑子陳棕炭荷葉炭再診崩漏已止而腰尚痠營血虧損未能遽復也黨參茯苓生地歸身白芍川斷杜仲木香砂仁沙苑菟絲餅棗仁紅棗經水淋瀝不斷腰脊痠疼奇脈不調經絡不暢而痞塊撑痛兼見虛窒之象用調暢奇經兼疏血絡生地炭全當歸白芍青皮廣皮川鬱金茜草炭阿膠蛤粉炒川斷海螵蛸橘核橘絡枇杷葉方按宜加木香崩漏屢發不止右關脈弦數壅結肝火內擾血不能安據述起由經阻營絡先已不暢當熄肝和營勿遽用澀生地白芍歸身丹皮丹參白薇黑山梔阿膠蒲黃炒茜根炭刺蒺藜牡蠣烏鰂骨穭豆衣側柏葉炭藕節再診血漏未止稍勞即發下部經絡不舒奇脈不暢肝火不平宜以攝營法內佐以清肝和奇其上部之痰濁不清當另化之生地全當歸白芍川斷菟絲子杜仲烏鰂骨阿膠蒲黃一錢拌炒丹皮白薇石決明砂仁苡仁太子參茜草藕煎湯代水經停數月而作崩六七日來崩勢已定而少腹痠楚經漏淋瀝脈數疾微弦右寸關尤覺鋭快舌苔滿白舌質不華營血大傷脾陽不振而痰濁因之阻壅故納穀不旺也形寒發熱是營陰之氣虛散不攝乃失血後常有之證所慮脾陽就損恐其虛熱淹纏一時不能清復耳擬方用養血攝營溫脾和中之法綿耆新會皮砂仁木香炮薑炭丹皮生地炭歸身白芍白薇阿膠蒲黃炒茜草炭川斷肉側柏葉先經停而後崩漏腰脊痠痛奇脈不調衝任不固頭暈少納肝胃不和當固攝奇脈兼和肝胃歸身生地白芍砂仁川斷杜仲菟絲子金毛脊川鬱金木香青皮杭菊阿膠蒲黃炒藕再診崩漏之後肝血必虛其頭暈嘈絞乃肝陽上擾之病脘塊攻撑木氣不和也帶下腰痠中氣虛陷也總以調補肝脾固攝奇脈為主生地炭歸身炭丹皮白芍石決明刺蒺藜於術苓皮砂仁川廣鬱金茜草炭菟絲子杜仲烏鰂骨銀杏肉鮮藕煎湯代水奇脈不固為木火所沖激經漏不止腰痠色瘀法當清肝固奇疏暢營絡生地歸身白芍丹皮川斷杜仲菟絲子烏鰂骨杞子沙苑砂仁阿膠蒲黃一錢炒穭豆衣茜草炭藕節茺蔚子崩漏後晚熱盜汗脈象細數而弦此必有微邪乘虛襲於營分留戀日久即為營損舌心黃厚兼有食滯不化擬方養陰泄邪稍兼化滯之意細生地歸身白芍丹皮青蒿白薇延胡荊芥炭生鱉甲枳實炭焦六曲茅根肉方按用青蒿鱉甲煎加歸芍薇荊從陰分泄邪延胡枳曲以化食滯面面周到左脈浮數右脈虛細經漏淋瀝腰痠嘈運血不養肝木燥生風血不能藏愈漏愈虛當清肝攝營用滋熄法生地炭歸身炭東白芍茜草炭烏鰂骨丹皮炭黑山梔左牡蠣刺蒺藜女貞子旱蓮草十灰丸絹包藕節另歸脾丸每服三錢藕湯送下方按既云滋熄何不用蒲黃炒阿膠調經門經水先期而淡此肝經有火血不能藏血少則淡理固然也平日納穀不多則血無生長之源頭暈內熱皆肝無血養所致調治之法當滋養肝木以為藏血之地培養脾土以開生血之源而調補奇經之法亦當並用生地全當歸白芍丹皮於術砂仁木香刺蒺藜石決明棗仁茯神菟絲子甘杞子龍眼肉癸水停阻但內熱而不腹痛脈象虛細數碎此由營陰不充本有枯澀之機復值酸斂因而虛澀生熱病雖初起而根蒂頗深先宜疏營撤熱冀得暢調為主生地全當歸白芍丹參丹皮炭茜草根石決明青蒿子白薇川斷紅緑梅花茺蔚子肝血因經漏而發營虛則內熱所由生也無如胃液久傷舌光少納脾運不及不能輸化後天少生化之原營陰何由而復擬方肝脾兩補兼參養胃之意生地歸身白芍於術砂仁雞內金木香丹皮白薇牡蠣麥冬穀芽脾氣虛弱不能統血氣病則納穀脹滿血病則經水淋瀝氣宜疏通血宜固攝當兩意並治於術廣皮木香砂仁歸身白芍丹皮茜草炭石決明穭豆衣甘菊炭遠志炭棗仁烏鰂骨藕湯代水癸期遲而淋瀝不爽少腹氣滯奇經之氣不得疏暢也而脘悶納少頭暈偏痛則肝陰虛而肝陽上越矣小便墜痛而澀兼有血絲病在氣淋血淋之間腰痠帶下又屬脾虛濕陷奇經不能固攝所致納穀作脹肝脾不和脈象虛細弦數氣虛而窒血虛而瘀病情虛實紛錯調治甚難得手姑與氣血兩調佐以上熄風陽下疏瘀濕冀其漸得向松香附烏蘇歸鬚白芍丹參砂仁苡仁川斷杜仲菟絲子沙苑子石決明杭菊馬料豆銀杏肉香櫞皮方按細繹案語宜加和瘀如琥珀大黃炭似不可少再診病情虛實紛錯而大綱不外肝脾腎三經主持刻下肝陽不靜肝氣未舒納穀作脹少腹塊痛仍當熄肝和陽氣血兩調之法香附全當歸白芍丹參川楝子延胡茯苓砂仁川斷杜仲菟絲子石決明杭菊車前子香櫞橘葉改方去延胡川楝子加丹皮黑山梔起由瘧邪內陷漸致寒熱往來經停盜汗刻診脈軟細而數右手帶弦臍右瘕痛日作舌尖紅苔黃泄瀉少納脈浮統觀脈證因邪陷而傷陰因陰傷而營損最重者刻已損及中焦不能多進滋濃用藥殊難為力耳全當歸生地炭白芍吳萸一分炒丹參丹皮青蒿鱉甲於術砂仁青皮白薇生穀芽荷葉方按顧此礙彼用藥頗難著手此方觀似平淡無奇實則斟酌盡善西洋參不妨進用晚熱盜汗氣撑脅痛病歷一年脈象虛數刻下足冷顴紅氣促不臥肝氣上逆於肺木鬱化火陰血被耗近來月事不通即其驗也證屬郁損姑與熄肝肅肺旋覆花代赭石歸鬚白芍丹皮白薇青皮川廣鬱金瓦楞子橘絡左金丸枇杷葉木蝴蝶方按宜加牡蠣沉香一以潛陽一以降氣向來肝氣不和近患瘧疾肝脾兼病經停一載而無瘀阻見證想因營血澀少所致近日納穀脹悶作嘔中土為木氣所乘脾胃交病先與泄木和脾疏通氣分香附丹參半夏廣皮茯苓桂枝白芍全歸青皮左金丸砂仁竹茹香櫞停經一載而無塊痛之證脈象細弱左手微弦納穀甚少兼作脹悶先天營氣本弱加以肝木失調氣窒而血液不暢與瘀阻者不同先擬暢肝和脾納穀漸旺乃可漸進營分歸身白芍黨參於術茯神棗仁半夏麥冬青皮木香雞內金砂仁丹參香附秫米穀麥芽再診經阻內熱而無瘀阻見證其為營虛血少無疑前因肝胃不和不能納穀是病不在血而在氣當於養血中兼調脾胃但病關情志須暢懷調攝乃能奏效歸身白芍於術青皮半夏木香黨參棗仁茯神遠志麥冬枳實炭左金丸穀麥芽枇杷葉方按此歸脾合左金溫膽法也向患肝木不和今則肝火偏甚不能藏血癸水淋瀝不調時覆逆行為衄脈象虛左弱右弦遇節發熱營陰為木火所爍陰血日虧肝陽日亢有延及營損之慮擬用養血熄肝調暢肝營之法生地白芍歸身丹皮丹參白薇牡蠣鬱金牛膝炭茜草炭穭豆衣阿膠青黛拌炒月季花再診衄血雖止而營熱未清左脈澀數右脈弦數營血不充肝火不靜再與養血潛肝苟得營陰充足則經自調而痛自止生地歸身白芍丹皮丹參白薇牡蠣黑山梔牛膝棗仁阿膠蛤粉炒茺蔚子月季花方按此痛字大約是熱字之謬否則與方藥不合經水先期左脈弦數此肝氣不和木鬱生熱故血不能藏耳當與涼肝泄木清養營分生地歸身白芍赤芍丹皮丹參黑山梔香附茜草穭豆衣瓦楞子藕節玫瑰花寒濕之邪乘虛襲於奇脈腰脊痠疼癸期愈甚法當溫調奇脈厚杜仲川斷肉長牛膝菟絲子全當歸茯苓金毛脊補骨脂酒炒白朮砂仁胡桃肉再診經來腰脊痠疼上引頭痛寒濕之邪乘虛陷於奇脈法當溫經調營兼和肝氣厚杜仲川斷肉長牛膝全當歸丹參香附金毛脊砂仁川芎秦艽胡桃肉少腹痛門癸水逾期不通少腹塊痛病在奇經屢經攻克肝脾受傷脈象虛數內熱少納轉見營損之象實病未除而虛證復起當與循經和絡通調奇脈當歸白芍牛膝吳萸三分炒續斷紅花丹參白薇金鈴子延胡香附橘絡核桃仁降香再診前與通調奇脈少腹痛墜較甚肢冷氣穢下焦營氣不通更兼肝木橫克再與溫暢奇經兼以疏肝和氣全當歸小茴香五分拌炒烏藥白芍牛膝吳萸四分拌炒延胡續斷肉橘核青皮木香香附楂肉蒲黃粉絹包入煎五靈脂絹包入煎降香三診少腹痛勢略減而癸水未通營氣仍窒少腹塊墜不化此證雖有瘀血內阻而內熱少納脈數色浮血之來源本少專與消克更傷正氣自當參用增水行舟之法於養營中復入和瘀暢氣之品乃為穩便生地生薑炭四分煎汁拌炒全當歸小茴香五分煎汁炒牛膝吳萸四分煎汁炒川斷桂心三分煎汁炒木香砂仁延胡丹參香附檀降香五靈脂蒲黃粉絹包入煎營氣虛滯經來腹痛用養營法兼調肝脾全當歸小茴香五分炒白芍烏藥牛膝吳萸四分炒延胡川斷肉桂心三分煎汁炒橘核木香砂仁紅花玫瑰花胡桃肉經來少腹滯痛營氣窒塞奇脈不調用溫通法全當歸白芍川芎烏藥牛膝吳萸炒紅花川斷木香楂炭降香胡桃肉癸水先期而痛營絡不和當與溫通全當歸白芍烏藥牛膝吳萸炒丹參川斷青皮楂炭香附青廣木香胡桃肉益母草再診癸遲腹痛營血為寒氣所阻當溫經暢營全歸白芍川芎烏藥牛膝吳萸炒川斷蘄艾葉香附青皮楂炭桂丁子胡桃肉經來少腹痛發熱肝膽之氣不和用逍遙法加減全歸白芍川芎烏藥川斷肉丹皮青皮柴胡青蒿楂炭砂仁橘葉橘核方按既云發熱山梔似不可少奇脈隸於肝以肝主血也經來少腹滯痛木氣下陷則營絡窒滯周身經絡牽掣以肝主經也脈象虛軟帶弦以和肝為主佐以溫通營絡全歸白芍川芎烏藥川斷牛膝吳萸三分煎汁炒延胡丹參楂炭青皮木瓜厚杜仲橘絡絲瓜絡首烏藤經遲腹痛寒阻奇經當與和營溫化全歸白芍烏藥牛膝吳萸炒川斷延胡香附楂炭青皮桂心末沖胡桃肉益母草肝木鬱結下陷於奇脈經來時少腹撑痛小便不爽用清泄木火通調奇經之法川楝子延胡青皮丹皮丹參全歸白芍車前子通草川斷肉穭豆衣青廣木香陳佛手燈心再診肝氣內結營絡不通經事遲而少腹作痛木鬱化火時常尿阻作痛當清肝暢營兼泄火腑金鈴子延胡歸尾牛膝紅花炒烏藥丹皮丹參香附黑山梔赤苓木通車前子淡竹葉玫瑰花胎前門重身五月腰脊痠疼此腎虛不能系胎之象素病嘔惡胃氣上逆則中氣不固當和胃安胎黨參於術茯苓廣皮白芍川連淡芩砂仁蘇葉杜仲菟絲子竹二青嘔逆經年胃氣先不通降復因胎氣下阻膚腫氣促小溲澀少而痛濕熱阻結氣機不化擬與清調脾肺疏降胃氣杏仁蘇子豆卷廣皮茯苓皮桑白皮冬瓜皮瓜蔞皮砂仁焦曲細川連乾薑一分半拌炒半夏淡芩枳實香櫞皮竹二青肝木不和瘕撑脘痛惟經停兩月右尺及關浮滑似有妊象姑擬疏肝和胃勿動營分青皮香附歸身白芍木香砂仁廣皮茯苓枳殼菟絲子杜仲佛手竹二青妊娠逾期反無轉動之形刻下漏血墜痛胎元受傷氣眯不能轉運先用佛手散加味以消息病機全當歸川芎生鱉甲頭髮灰綿耆冬葵子桃仁長牛膝紅花五分炒烏芝麻再診胎元受病血漏氣窒逾期不動近日腰背痠疼有下行之象再與調暢氣血俾得運動為佳厚杜仲炒枳殼奎砂仁上綿耆細生地冬瓜子杜蘇子竹二青重身六月而病胎漏右脈浮數腰腹墜痛胎元受傷以右脈論當兼涼胎為是歸身赤白芍黑山梔淡芩生草茯苓砂仁阿膠蛤粉炒杜仲菟絲子白麻皮蓮子紋銀産後門發熱咳嗽色黃盜汗脈虛細而數病起産後邪戀致虛將及蓐損之候全當歸白芍青蒿白薇丹皮丹參廣皮蘇子葉南沙參前胡杏仁紫菀益母草茅根肉産後感邪咳逆氣促音破肺氣不能疏通濁痰阻窒脈細不暢當與疏化泄邪旋覆花蘇子杏仁白芥子紫菀前胡枳殼海浮石瓦楞子全當歸川芎桑葉枇杷葉産後塊痛攻撑雖不得專屬於瘀而病必在於營絡近增寒熱無汗兼有時邪先與和營疏泄歸尾川芎香附木香青皮青蒿荊芥蘇葉澤佩蘭川鬱金烏藥茅根益母草少腹響痛由下而上發則形寒內熱起於産後此由寒氣襲於下焦營分阻窒奇脈不和而大解滯痛則涉及腸腑矣以溫通營氣為主全當歸小茴香五分炒白芍桂枝四分炒牛膝炭丹參丹皮白薇延胡青皮木香烏藥降香胡桃佛手小産後瘀血未淨寒氣窒於奇經少腹撑痛近增寒熱當暢氣和營通調奇脈全當歸白芍川芎金鈴肉小茴香五分炒延胡牛膝吳萸三分炒紫丹參粉丹皮烏藥香附青蒿白薇青廣木香益母草雜證門病情輾轉補瀉雜進延今一載有餘近日足痿色浮嘔惡悶痛多服辛溫之物遂增煩躁氣迫甚則呼號欲絶細究病原皆因痰阻氣窒致陰陽兩氣否隔不和各致其偏之極復挾痰氣蒙冒升逆故病狀變幻若此正氣乘亂用藥頗難姑與交濟法佐以疏通痰氣旋覆花半夏鬱金川連先用鹽水炒再用桂枝二分煎汁拌炒瓦楞子長牛膝川楝子象貝膽星廣皮黃精茯苓神辰砂拌紫石英延胡鮮石菖蒲竹茹河井水各半煎方按黃精一味似乎嫌滋與痰阻氣窒之證不甚合拍時邪之後中氣虛陷濕濁留戀膚腫力乏脾氣下陷也腰脊痠痛睡至五更則痛甚此因腎氣虛而濕邪注之睡則督陽之氣留著不運則甚痛也足根作痛三陰經氣虛也刻下間有寒熱中焦餘邪未清兼理治之於術砂仁苡仁橘絡金毛脊川桂枝茯苓半夏豆卷青蒿淡芩澤瀉薑皮茅根肉脘腹久痛不愈脾氣不舒濕積交阻之象面黃脈弱舌色嫩紅不特脾陽受困而胃陰亦傷矣調治頗難姑與疏調中氣白芍青皮枳實川連乾薑一分半同炒奎砂仁炙雞金六曲茯苓楂炭生草川石斛穀麥芽肝陰不足痰氣由少陽上逆膚脹項腫癸水愆期吐紅內熱當養營和肝清火降氣全當歸白芍丹皮黑山梔白薇橘紅牡蠣川鬱金牛膝五茄皮青皮刺蒺藜穭豆衣夏枯草茺蔚子脈象弦搏右手較硬四肢時或作冷夜寐不安此由肝陽內動之氣厥而不和當潛肝和陽兼清肺胃太子參歸身白芍生地石決明夜交藤茯神棗仁丹參橘絡川百合女貞子旱蓮草一錢半拌蒸蓮子磁朱丸一錢半燈心湯送下少腹痠痛牽引腰臍腿足此由經絡瘀阻營氣壅窒所致近更寒熱絞悶噁心頭痛左脈弦數肝氣時邪同時挾發病機錯雜用藥殊難姑擬泄肝和胃兼佐通絡之意金鈴子延胡青皮川連吳萸炒鬱金川淮膝歸尾杭菊半夏橘絡豆卷苡仁佛手絲瓜絡竹二青口舌碎痛舌質光紅心脾鬱熱上浮法當清降但納穀便溏中氣易於下陷勢難偏潤擬用清泄法兼佐和脾之意細川連淡芩川石斛洋參雞內金銀花炭廣皮砂仁生草生熟神麯青果方按元參似不可少痛由左脅及脘掣及胸背上引太陽脈細弦右浮餘邪內伏肝火上浮當蠲飲泄木兩法並用半夏茯苓青皮廣皮桂枝乾薑川連鬱金刺蒺藜杭菊炭瓦楞子竹茹佛手肝升太過肺降不及眩暈麻痛咳喘脘脹肝與肺胃之病層疊錯出脹勢偏於右脘不特胃氣不舒兼有痰濁內壅仿黃氏法疏木清風肅肺降胃白芍木瓜刺蒺藜石決明丹皮全當歸旋覆花川貝廣皮半夏桂枝連皮茯苓制馬料豆香櫞竹二青熱留營絡為風邪所襲發為癮疹癢不可耐法宜疏通營絡清泄血分風熱細生地鮮生地丹皮赤芍歸鬚刺蒺藜殭蠶忍冬藤絲瓜絡防風荊芥生甘草蟬衣五加皮干浮萍桑枝茅根肉丸方刺蒺藜八兩全當歸二兩生地四兩赤芍二兩地膚子三兩防風一兩荊芥一兩五錢丹皮二兩生草八錢殭蠶一兩五錢菊花一兩銀花炭二兩共研末用酒炙桑枝四兩干浮萍一兩煎汁泛丸久患癘風皮膚紫塊流血筋節麻木復增頭眩心絞口目牽掣風毒之在營者不特外走經絡抑且內攻臟腑病候深重先與涼血疏泄風毒細生地全當歸赤白芍丹皮炭左秦艽羚羊角刺蒺藜制殭蠶忍冬花夜交藤地膚子五加皮桑枝松節瘍潰營虛內熱少納而餘毒留結瘍腫疊見當和營清陰疏化餘毒生地炭全當歸赤芍丹皮連翹防風荊芥生甘草廣皮忍冬花桑枝邪由肺俞襲入骨節心痛徹背脊骨外凸痛連兩脅兼作咳嗽脈象虛細而數右手尤甚近日胸脘刺痛亦絡氣不通所致正虛邪痼不易得效先與和絡肅肺旋覆花川百合紫蛤殼紫菀歸鬚去油乳香四分研末拌炒鬱金刺蒺藜丹參橘絡絲瓜絡瓜蔞皮麥冬枇杷葉竹茹
