body:
  text: 醫論論溫邪上受首先犯肺逆傳心包溫熱論歷代諸家論溫均附於傷寒篇中所論者皆伏氣發溫之證名之曰類傷寒從未有專論暴感之溫邪者自葉天士溫熱論出首用辛涼而暴感之溫邪始有一定之證治矣夫內伏者由冬時受寒邪伏於腎至春則寒邪化熱乘陽氣之上升而出此伏氣發溫之原也外感者乃春時風溫盛行邪襲於肺而發此外感溫病之原也受病既殊則治法亦異論治者必須分析清楚庶使後人可以遵循施治乃觀其篇首所云溫邪上受首先犯肺二句既實提外感溫邪而言而又未將暴感與伏氣兩層提清眉目若謂溫邪只有此一種者致後來醫家囿於葉氏之論混稱溫邪初起只用辛涼一法設有以伏氣發溫告者彼且茫然不知為何病謂非葉氏此論有以作之俑哉雖然葉氏之論正不可謂其概無足取也夫暴感溫邪即春令風溫之邪也以傷寒溫散之法治之固不相宜即以伏溫清托之法治之亦多不合葉氏倡輕清之論立辛涼之法使後人於暴感溫邪之證有成法可循其功正復不少宜乎吳鞠通章虛谷輩為之極口稱揚而不置也而愚則更有辨者設葉氏於溫邪犯肺之後但列外感之證如咳嗽頭痛諸候則後人讀之猶得謂葉氏此論專指暴感而言不至與伏氣相混也而不謂其下文有熱傳心包一語竟將伏氣之病混入其中而不自覺其過也蓋邪傳心包之證皆因伏溫蘊熱過重有熱壅肺胃由肺胃熏蒸而陷入者有熱不外達徑由陰經陷入者是仍伏溫中至重之證若暴感風溫由外入內最重者不過鬱於營絡發為斑疹喉痧而已未必有蒙陷心包之重候也自葉氏以此語扭合於暴感之中於是後人愈不識有伏溫之病即見有蒙陷痙閉諸險證亦不知其邪從內發而概以葉氏逆傳心包一語為詞病原既混則治法焉能絲絲入扣夫溫邪為時邪中常有之病伏溫為時邪中最重之證葉氏此論為習醫者初起必讀之書絲毫含混性命所關是不可以不辨傷寒多有變證溫熱雖久在一經不移以此為辨解溫熱論傷寒之邪隨經氣而內傳其證即隨經氣而變此傷寒所以多有變證也溫熱之病由內而發其熱一潰則或竄於臟或結於腑雖輾轉纏綿變相不一而熱邪所結聚之處則始終不遷此溫熱病所以一經不移也傷寒自外傳內日深一日故病情日見其遷變溫熱由內達外觀各經兼見之證病機雖有進退而病根則著於一經而不動學者察其外見證而為寒為溫固已灼然不惑矣唐笠山改作總在一經似乎一經之外毫無兼證其意已執滯不通章虛谷改作而少傳變則似乎溫熱病之見證自始至終不容稍有更變者豈理也哉又趙樹誠仲景傷寒論謂寒邪初犯太陽見脈浮頭項痛惡寒之證傳至陽明則太陽證罷而變胃家實身熱汗自出不惡寒反惡熱之證各經見證界劃昭然所謂傷寒多有變證也惟少陰伏溫則不然經云冬傷於寒春必病溫又云至春發為溫病至夏變為熱病其邪受於冬藏於腎至春夏陽氣上升而始發其鬱伏有數月之久而未發之前初不轉稱於他經不若傷寒之感而即發發即傳變也此所謂溫熱雖久在一經不移也其發也或由三陽或由三陰本無一定但病雖由六經而外達而少陰之伏邪尚未能一律清透則雖屢清屢泄苔退舌淡神清風平乃逾一二日而伏邪又熾舌復干絳苔復黃燥痙蒙復作者亦往往有之蓋至既發之後其變證雖多其原仍不離乎少陰也此亦可謂雖久不移也彼笠山虛谷輩妄為竄易蓋未能識葉氏之微意耳柳谷孫評説一經不移處分未發已發兩層作解思路親切詞句亦圓轉不滯論暴感溫邪與伏氣發溫初起見證如何分別用藥之法同異若何溫為陽邪即暴感亦有兩種冬溫兼挾寒邪春溫挾風邪而均由乎外感所見之證不外肺胃兩經如頭痛咳嗽氣逆痰多寒熱痞悶煩渴嘔惡皆肺胃外感之證脈象不外浮弦數大用藥以辛涼散風或兼辛溫祛寒而必以清泄溫邪為主余則各隨見證而施治焉此暴感溫邪初起之大概也至於伏氣發溫在內經謂冬傷於寒春必病溫又謂冬不藏精春必病溫即此兩言推之則此病必少陰陰氣先傷而寒邪襲之至春夏化熱而發故又有先夏至為溫病後夏至為熱病之文可知此證隨時可發不拘拘乎在三春也眉批溫邪隨時可發此層補得極圓熱在骨髓故骨節煩疼昏昏欲寐脈象愈按愈數尺部不靜尺膚燥熱或渴或否舌苔如平人凡此皆熱內郁之見象與外感迥殊其外達也或出於三陽則有三陽見證或燔於肺胃則有肺胃見證其重者不外達於陽而內陷於陰在厥陰則痙厥昏蒙太陰則黃浮腹滿少陰則熱爍咽乾凡病入三陰者無非液涸陰乾以致危殆眉批溫邪變證繁多雖未能闡發無遺然大致亦不外乎此矣更有熱傷血分營絡沸騰在上則咯血衄血在下則溲血便血又或熱壅絡阻為癰膿瘡毒為咽乾口腐為斑毒痧疹此又伏氣發溫之變態各隨時令體質而轉移變化者也治之之法總以養陰托邪化熱為大綱蓋初化熱而陰氣先餒則不能托邪外達既化熱而陰液內涸則不能清熱化解故始則助陰以托之如梔豉加生地及黃芩湯黑膏之類繼則養陰以化之如犀角地黃黃連阿膠之類治溫之大法不外是矣此外更有腎陽不充致伏寒不能化熱而冰伏於內者當依喻氏之論用傷寒少陰篇之麻附細辛等法參入養陰劑內以溫托寒邪此又伏溫中陽虛之變證不甚多見者然在醫者固不可不知伏溫中固有此一候也由此觀之暴感之見證邪自外來伏氣之見證熱由內發細意辨之固截然不混也即有一二條面目相同而以見症核之則疆界判然不容牽混辨證既清則藥隨病變其用藥更自有不容混者更何待別其名而用藥始有異同哉暴感溫病病淺而易識伏氣發溫病變繁多不易辨認前路分疏處詳列伏氣病原證候亦既詳且盡矣至末篇總結將內外合篇辨析彌精學者讀之應不至再有歧途之惑矣教言豫看病三十年來自著者兩方一方瘀熱湯用三味旋覆花湯加茅根枇杷葉治瘀熱積胸痛最妙一方未定名目治痧疹後邪戀正虛將成勞者倘神識脈情已脫者無益也方用四物加杏仁蘇葉桔梗問痹症治法師曰痰在絡中一用補藥便成拘攣大法用蠲痹湯送指迷茯苓丸即茯苓枳殼半夏曲風化硝陰火上乘亦有真有假真者不治假者豫用豬膚湯苦酒湯亦效豬膚須用黑毛皮外另一層惟春夏間有今所用者多是肉皮苦酒煎雞子法武火為佳治肺花瘡亦效然究難痊豫看何姓病用瘀熱湯加忍冬藤橘絡鴨血炒絲瓜絡歸鬚此皆搜剔之藥所謂由此方而擴出一層也若收進一層則加生地阿膠凡方必有出入八面顧到才成一方豫昔看書每見一病不看伊方先自想一方然後再看伊方一日看千金見産後陽虛咽痛一病思其方不可得及看其方乃八味丸加用紫雪丹為衣大妙大妙但此種方極重不得浪用必有此病到手一用即是仙丹有風疹塊不時舉發者性天先生殊不經意曰此風入肚中耳用白蒺藜丸加山梔防風兩味而愈此兩味即山梔丸問改春洲芎枳散先生曰郁咳成勞邪鬱於氣血之中用川芎以挑血中之邪枳殼以挑氣中之邪或干或臭或五色之痰皆可從此化去有陰火者斷不可用況此病下午發熱者乎能將改方想其所以然則得法矣得法者得心之法也友竹云芎枳治冷風若熱風服之必見血問芎枳不輕用者乎曰此升降法也必有寒風化熱鬱閉於肺用芎之升枳之降挑松之火重者不可用陰火者更不可用恐火升則火易動耳至若勞風法在肺下一條此風鬱之更深於此方者則柴前連梅煎其中有膽汁豬脊髓童便等一面降陰火一面用柴前挑散風邪可知立一方其中斟酌盡善有不可思議之妙尤在涇金匱翼中論之甚詳想當時逐漸增減不知推敲幾年而至盡善盡美後人漫不加察最為可惜黃疸兼臌脹症古人以為必死豫看蔣姓此病其自問必死豫用附子理中湯二十劑腹脹大平黃疸盡化惟胃口不開曰胃中必有機竅不靈必當有以撥之蔣曰奈何曰豫所謂蓽撥即藥也因取所服方加蓽撥一分明日大愈此一時戲言而蔣姓至今不忘此語想古人命名亦必即此意思也復友吐血症曰其人即刻大吐而舌帶黃白苔雖血症而熱尚在氣分仍用石膏若舌紅則用犀角地黃矣當歸一味溫經之功比附子尤應手此余所親歷也思泉問真中類中之辨曰真中有外感類中多內風必謂南人無真中者非也謂類中必無外感者亦非也倘表證而兼惡風惡寒便當用桂枝湯不必拘拘泥定古法肝虛頭痛用女貞子實者鎮之散之咳嗽一門嗌乾咽燥補肺阿膠散之注腳陰虛咳血四陰煎之注腳肺燥胃濕麥門冬之注腳夾陰火者假麥門冬肝火上升而見血參用鹽降法他可類推脾胃一門目黃脘痞越鞠丸之注腳中虛挾濕枳實消痞之注腳他可類推竹士云越鞠是濕熱二字枳實消痞是虛而有積滋燥兩難清燥湯之注腳脾陽不升胃濕有餘升陽益胃之注腳杭州徐石泉云曾見一婦人大便後眩運數刻屢發至數年豫用逍遙散兩劑而減後用補中十劑而愈六味丸加遠志二兩治腎虛耳聾甚效牡蠣其性最妙收濕不傷陰斂陰不礙濕曾見一外科席子童治重舌用酒醋入五靈脂數錢煎數沸令病者漱口吐出即愈想靈脂破血中之滯而醋又能引入血中也小溫中丸與溫膽湯溫字用意乃去其火熱俾得復其和平之氣耳非因其冷而溫之也曾見三和尚治一心悸症挾濕火者用歸脾法數劑而愈其方以白苦參代人參具見靈活之妙喉痹有陰火者有外感者須辨外感症豫用紫雪丹一錢甚效七月十八日看疝氣病用肉桂五苓川楝等先生曰此的對之方是病膀胱氣也又在二十一種疝氣之外問桂枝龍牡與真武分別處有動靜否曰然桂枝龍牡是神昏真武則清一則汗從腎來一則汗從心來問桂枝龍骨牡蠣與柴胡龍骨牡蠣何如曰一則太陽經亡陽一則少陽經亡陽問發狂必有火桂枝龍牡何以用曰此病必有太陽症未除所謂狂者神魂失據非實火也肢寒汗出陽欲外亡安得不用桂曰果爾何不用附曰附回腎陽桂回心陽石膏證口渴汗多脈大六字盡之過其時口不渴脈細便入血分是犀角證汪竹士云調中益氣是氣陷而瀉者其舌濁而膩益胃升陽是氣陷而中脘有積者其苔薄而紅竹士問陽虛咳嗽曰子不記小青龍見證乎論瘀血一訣凡臌脹者看似脾虛服白朮更甚者其中必有瘀血問瘀血曰此病見證産後十有八九其餘大便漆黑者如栗而硬者腹痛者腹中有塊者皆是至於室女尼師經閉尤為易見大約兩目暗黑肌膚甲錯不易之論因憶二十年前潘畹蘭家乳婦經事不行教伊服大黃蟅蟲丸下黑糞甚多後教伊服土鱉蟲而愈病有虛中挾實燥中挾濕者法當兩顧如豫治喘症用蘇子降氣合貞元飲十靈八九喘平後當用腎氣丸丹溪治腳氣亦用此方靈舌苔冷白陽氣大虛往往行動如常轉眠即脫冷白二字豫所創也蕭姓病心下堅大如盤服附子理中細辛枳朮等反瀉腹痛少腹滿繼服附子理中又見氣短先生曰是必有血瘀熱血滯於中而氣不能化也因問其大便之色曰有干有薄乾者如栗而黑因看常熟人臌脹病曰此真臌脹也色蒼黃腹筋起古人之言斷不虛説讀書時滑過看病必不留心大抵中虛滿者皮色不變按之中硬而外軟此中不可不分治一痞脹症濕熱內壅彼醫用承氣等法脾愈虛而脹愈大豫用胃苓一劑而痞減得睡明日加附子五分去豬苓澤瀉再服數劑而愈醫通一書其分別處甚好然亦有隨筆寫出精神不聚者若欲自成一家須各家匯聚看過取其所長而略其所短胸脅痛論秦皇士傷寒大白胸胃皆在中脅肋在身之側故脅肋之證在雜症門中以肝膽肺三經所主外感門惟一少陽蓋表邪傳裡必由胸以至脅故胸滿多是表證腹滿方是里證若脅滿脅痛皆是半表半裡之證然傷寒發熱脅滿痛亦有兼太陽陽明表邪者故無汗脈浮惡寒脅痛先用羌活柴胡防風湯發散表邪然後用小柴胡湯合小陷胸湯加枳殼桔梗山梔青皮治之若有痰飲內結再加豁痰藥另有一起即從少陽發寒熱或兩肋或一肋刺痛甚則痛極而死此感時行燥熱伏積於中又被風寒外束鬱於少陽名肋刺傷寒又名痧脹是也若無汗惡寒脈浮緊先用羌活敗毒散表邪隨用小柴胡湯加山梔青皮蘇梗木通疏散少陽若是燥熱加知母石膏則汗出邪散不愈刺委中三里並刺十指出血即名放痧法另有脅痛寒熱又見咳嗽氣逆此肺受外邪名金邪入木有膽經有火刑剋肺金名木火刑金此二證最重初起發熱脈浮無汗者防風瀉白散加枳殼桔梗若無汗惡寒身痛有表證者加羌活柴胡散表邪若有汗脈沉數用黃芩瀉白散合梔連枳桔湯若燥熱流年重加知母石膏即見少陽胸脅痛證亦是金邪入木仍以肺邪為重當清肺燥禁用辛溫若無肺經喘咳之證則單治少陽按外感脅痛最重肋刺傷寒以時行厲氣客人最速宜詳歲運何司政豫故分詳少陽脅痛肺邪脅痛二條其下手認證處以下咳嗽為少陽以咳嗽為肺邪以左脅痛為少陽以右脅痛為肺邪其認脈處以左手脈病為少陽以右手脈病為肺邪其論治法以脈浮身熱無汗先散表以脈沉裡熱時時有汗清裡熱其有服發汗之藥汗大出邪不解表藥中重加黃芩山梔枳殼青皮以清少陽重加知母石膏枳殼桑皮以清肺邪又有用一半散表一半清裡重用木通蘇梗疏通經絡得和解之力而愈者豫嘗以木通蘇梗各五錢加入和解方中以治無汗脅痛身痛汗必出痛必減以木通通竅蘇梗疏散耳豫嘗以木通蘇梗各五錢煎湯治發熱脅痛多有發斑痧而愈者按此二味藥未嘗治痛今以之疏通經絡通則不痛矣按此二味藥未嘗主發斑痧今以之疏通經絡則邪散而斑出矣詒按若發熱咳嗽胸滿而兩脅痛如挫者此邪熱挾濕痰攻注也小柴胡去參半加枳殼桔梗栝蔞杏仁白芥子竹瀝薑汁若心下痛其人曾閃挫大便黑而脅下刺痛者此有瘀血也桃核承氣加枳殼柴胡不應加生附子脅下偏痛發熱其脈緊弦此寒也以溫藥下之大黃附子湯伏溫論論伏寒何以不伏別經而必伏少陰馮子可章日邪而曰伏必伏於幽隱之地其在陰分可知厥陰疏泄太陰運動邪不能留惟北方癸水職主封藏冬時主令水寒冰凍邪易藏匿寒犯水腑故成感而即病之傷寒寒犯水臟故成伏而後發之溫病也詒按名言至理書溫病條辨後上溫病條辨四卷原病一卷上中下三焦各一卷又附雜説一卷解兒難解産難各一卷共合為七卷吳子鞠通所著乃溫熱病中發聾振瞶之書也吳子生於嘉道間承吾吳大醫葉天士先生之後奮然著書大旨以千百年來醫家以傷寒之法治溫病為大誤處處將傷寒與溫病對勘如傷寒分六經溫病分三焦傷寒宜辛溫溫病宜辛涼傷寒重誤下溫病重誤汗逐條剖別辨析毫釐又歷論宋元以來諸家治溫病得失詳列於篇上則推本河間近則淵源葉氏議論明暢治法森列近醫於溫暑之治得以稍有遵循不偭規錯矩者不可謂非此書之功也第其書於外感中專詳溫病其於暑濕諸證不過連類及之而此書之謬誤亦專在於溫病內經云冬傷於寒春必病溫此溫病由於伏寒之經訓也仲景云太陽病發熱而渴不惡寒者為溫病此溫病分六經之聖法也乃吳氏墨守葉氏溫邪上受首先犯肺之説又狃於葉案所載輕清之方遂毅然謂溫病皆因新感傷肺而起不信伏邪之説闢去六經之範圍而以三焦立淪固已不遵聖法顯背聖訓矣夫溫邪之始於肺者在冬春間時或有之不過溫風外襲咳嗽頭疼俗所謂重傷風也以辛涼輕劑解之即愈從未見此等輕證而有熱傳心包譫語神昏之變也其伏邪內發之溫類多從少陰外達假道三陽而出於陽明一經者為多苟熱蘊陽明而不得外解或其人陰氣素虛或醫家治不如法其熱竄擾於足厥陰則痙厥熏灼於手厥陰則昏蒙種種險象由茲而見然則伏溫之來大抵發於下焦盛於中焦而後燔及上焦者也吳子既定三焦之程法必從上焦説法不得不將伏寒發溫一層概行抹去而以銀翹桑菊不中病之輕劑為開手治法逮至熱竄厥陰遂以犀羚紫雪清宮涼營等藥倉猝雜投不尋其發熱之源但治其受熱之地遺本逐末病安從愈此非吳子之大誤哉且吳子致誤之由不過欲以三焦分治者拔奇於前人名論之外耳殊不知外感病分六經聖法昭然不可改易如傷寒則由三陽以內傳於陰溫病則由少陰而外出於陽雖一內一外一寒一熱迥乎不同而六經所見之證疆界井然確有可指醫家得以察病候之淺深而按經施治胥恃此也若廢六經而論三焦則病機之進退證候之淺深悉無把握而分經用藥之法亦無從理論矣此書之謬誤其大端不越乎是愚本不敢妄議前人特以此書盛行江浙為業醫者所必讀倘讀之者篤信此編而承偽襲謬不能別白而善用之將執此以辨症施治其貽誤良非淺甚少爰詳論之以諗世之讀是書者霍亂論序乙未六月點勘王孟英隨息居霍亂論畢不禁慨然於醫術之難言也霍亂為外感病之一症六淫之邪混於中者悉能致此自霍亂之治始見於傷寒論中後之學者遂只知傷寒有霍亂一以治傷寒之法治之豈知傷寒有霍亂猶之傷寒之有發熱頭痛也傷寒有之不可謂溫暑濕熱遂無其證也苟不辨其致此之由第見其外見吐瀉即為霍亂而以傷寒法一例治之方枘圓鑿格不相入其誤人可勝道哉元明以來名賢輩出亦有見夫法之不盡合而隨時變法隨證更方固亦有取效一時者而究未能於致病之由探其本源推其流極故所立治法仍不能挈其納領隨機圓通致學者靡所適從而隨手殺人茫不自覺此孟英王氏所以大聲疾呼而有霍亂之作也且夫內傷之病千古不易外感之證隨時變遷試觀漢唐以來千有餘年其病為古書所載而今無之者不少而今人所患之病為古書所未載者尤多誠以風氣之更變性質之澆漓人事之消耗凡古所無而今所有者幾於不可勝數而病即隨之學者苟隨時體察隨時參詳庶乎隨病變通有所領會也由是推之霍亂有傷寒暑濕之不同而凡瘧痢外感所發者亦各有寒溫暑濕之各異苟不究其源而概執柴胡以治瘧芩芍以治痢是何異於執理中五苓為霍亂之主方而不知變哉嗟乎學者不讀古書而師心自用其弊在於蔑古徒讀古書而拘執不化其弊又在於泥古必也會其意於書之中復能通其變於書之外庶幾論病則頭頭是道用藥則活潑潑地可以臨大證而應變無窮矣豈獨霍亂也乎哉霍亂證治霍亂一症上吐下瀉肢冷轉筋脈伏螺癟其外象歷年相似而所以致病之由各年不同刻下此症盛行幾於朝發夕死不及延醫今姑就今年之病推論之並擬治法如下今年芒種節內天氣先熱至小暑以後氣候轉涼寒熱之氣搏結於內中虛者受之中氣被阻則清濁淆亂再加新受酷暑外吸穢氣發為是病用奪命丹搐鼻中再用涼水調服一分重者二分或行軍散紅靈丹均可須服三五分方效再內服煎藥兩劑俾氣機開通清濁各歸其所則體之實者病之輕者即此可愈矣內服之劑細川連薑汁炒六分吳萸鹽水炒二分蘇葉八分淡芩酒炒一錢薑製半夏一錢半晚蠶砂五分白苡米夏布寬扎三錢通草五分木瓜酒洗一錢半陰陽水煎凡吐甚者重用川連加石菖蒲瀉甚者重用蠶砂加灶心土轉筋甚者重用木瓜酒炒苡仁加白芍牛膝絲瓜絡其有舌絳膚黑爪紫邪毒傷營壅於血絡者其勢最急加紫花地丁益母草銀花藤蒲公英熱甚者加犀角其有挾食挾痰中宮脹悶以致不能通達者加川厚朴蔻仁法半夏橘紅或加萊蔔子枳實其或伏溫之邪乘機挾發熱結不化者加豆豉淡芩山梔此證邪伏有輕重熱結有淺深須臨時酌之霍亂之最易誤人者四肢厥冷脈伏汗淋全是陽氣欲脫之象然其中有三證焉其一陰寒偏甚逼陽外越當用薑附以驅寒護陽所謂中寒霍亂也其一真元被擾虛陽外脫當用參朮桂附以固本回陽此正虛霍亂也其一熱邪深閉陽氣外厥凡內閉者必致外脫此須大劑清涼開泄伏熱俾內閉漸通外厥自回此是熱霍亂之最重者也此三證者毫里之差死生反掌苟非臨證細辨難以刻定凡服藥才入口未曾停留而即吐出者須令其坐定緩緩再服凡轉筋甚者用木瓜煎黃酒再加入燒酒乘熱用布尉拓凡足冷甚者用生附子打爛塗湧泉穴伏暑論暑為薰蒸之熱濕為黏膩之邪由口鼻吸受直行中道漫布三焦人在濕蒸熱迫之中無處可避適或貪涼夜當風露臥日復一日腠理致密邪機深伏經絡營衛之間遇燥涼之氣感觸而發即為伏暑初起形寒如瘧繼則壯熱煩冤頭昏噁心痞悶時作醫治不中綮遂變症多端敗壞難救者不可勝數大凡此症先明暑之氣何者為重如兼外感先散表邪而解表之藥尤宜分別如暑邪重者舌必乾燥苔必起沙邊尖必絳脈必弦數頭痛惡心形寒無汗治宜開太陰肺氣梔豉薄荷連翹蔞皮鬱金等如濕邪重者舌必黏膩脈必濡滯胸亦痞悶形寒無汗治宜辛溫開解如羌防蔻殼之類汗出復熱者宗諸竹葉石膏白虎羚羊之屬濕多者宗諸二陳達原五苓之屬其天水散二症總可加入使三焦通暢營衛流行絲絲入扣自然逐日向安病者再能潛心靜養茹素淡泊不彌月而告痊矣且暑為無形濕為重濁此類而推治宜分別混亂而施焉能取效乎醫者但知濕邪傷氣為痞滿嘔泄而不知燥邪傷氣亦能痞滿嘔泄耶失之毫釐謬以千里可不慎哉新涼外束暑熱內蒸形寒無汗舌白頭痛嘔惡壯熱煩冤治宜辛涼取汗淡豆豉解表除煩杏仁辛苦甘溫下氣潤肺解肌潤燥羌活防風發表祛風濕紫蘇發表散寒厚朴下氣散滿白蔻行氣開濕牛蒡辛平陳皮辛苦燥濕調中化痰茅根甘寒瀉火補中止血止噦蔥白生辛散熟甘溫發表和里通陽和血六一散甚者加柴胡苦辛微寒發表退熱升陽少陽主藥如得汗熱緩復熱煩渴不解者治宜開解太陰肺氣黑山梔瀉火連翹清熱橘紅辛溫化痰發表象貝苦辛微寒散結化痰鬱金解鬱化痰薄荷辛涼解表枇杷葉清肺和胃降火茅根瀉火瓜蔞開肺穴一散白豆蔻口渴加花粉酸甘微苦微寒潤燥生津川貝苦辛微寒潤肺清火熱不退加元精石鹹寒瀉熱自利去山梔加茯苓甘淡溫熱利水豬苓淡甘苦通行水澤瀉甘淡行水如轉瘧從少陽和解小柴胡湯清脾飲之屬如熱入營宜犀角苦酸鹹專瀉心胃火熱羚羊角瀉心肝火鮮生地瀉火生津益元散六一散加硃砂白薇苦鹹寒瀉膽熱川貝潤津清火黑梔瀉心火茯神補心如咳嗽清燥救肺湯隨症加減至於竅閉神昏舌強肢牽急以牛急丸至寶丹與前方兼進庶可十救一二如熱退便燥甘寒清胃養陰足矣南沙參甘苦淡寒補陰瀉肺火茯苓補心脾腎利水扁豆甘溫祛濕補脾消暑金石斛甘淡補陰生津火麻仁甘平潤燥清腸如病者口腹不慎暑濕與食滯鬱蒸醫者不察誤進寒涼遂苔黃痞滿嘔惡便阻急投苦降辛通如瀉心黃連溫膽小陷胸湯之屬如便解痞悶溫膽湯隨症加減為主孫晉庭先生云伏邪晚發天氣已寒初在三陽之經治宜分析詳辨在太陽蔥豉羌防湯陽明桂枝白虎湯少陽清脾達原飲熱耗津液竹葉石膏氣血兩燔玉女煎己任編有石膏逍遙散加入枇杷葉蘆根之類皆隨手取效者大凡六淫之邪無論風寒暑濕燥火溫病熱病瘟疫發斑等但遇口臭唇焦多系挾食醫者不察輒進寒涼遂致膠結不化大便屎如羊糞苔黃痞悶嘔惡便阻三黃白虎承氣陷胸歷進不應每每縮手待斃是以病人之死未必死於六淫之邪死於挾食者為多蓋上唇屬陽明大腸下唇屬脾胃食在上焦唇焦而燥消渴食在下焦唇焦不燥渴脈滑不數汗出熱不解先賢主以保和丸多加竹瀝萊蔔汁隨症加減痞硬加蔞連梔朴咳加朴杏食加神麯穀芽肉加三稜楂肉檳榔以分化之發斑用清胃散加檳榔朴半以消之斑未退用清胃散加犀角丹皮以化之歷治數載所投輒效常能起死回生今醫者治病無論在臟在腑一見熱甚即用竹葉白虎一見斑熱無論已透未透即用犀角地黃每每邪閉神昏口噤不語厄逆下利者比比皆是呂文清痢疾論治謹查休息痢一症其故皆由余邪未盡早服兜澀之劑或早食葷油酸斂之物致余垢留匿於大腸曲折之處人之精液氣血流行輸貫每至其處即留滯於此蒸化而為垢傷氣液者化為白垢傷營血者化為紅垢凡經年纍月垢下已多而其中仍不能盡者即此故也調治之法門徑雖多不外虛實二端此病由余垢而起本無純虛之證不過因痢久正虛或質弱或年老邪少虛多者苟能溫養脾腎扶助正氣氣機得旺則餘邪自不能留此治虛之一法也其實者或因寒積或因濕熱或因痰瘀凡腸中稍有阻窒即能致痢治之者寒積用溫化濕熱用清泄痰瘀用攻消但總須用丸劑緩緩化之與初痢之可以煎劑蕩滌者不同俟宿垢一淨即用培補之品以善其後否則中氣虛陷身中一切病邪均易下注每有積垢已清而滯痢仍不能止者職是故耳更有消補兼治之法一面扶正一面祛邪前人醫案有用補中益氣或四君子八珍湯等送下疏積導滯之丸藥者即此意也此治實症之又一法也尊體向來多濕前年痢疾恐系濕蘊生熱所致俱不知垢色如何不能決其所傷者為氣為血耳鴉膽子即苦參子瀕湖本草納目不載其能治痢疾惟趙恕軒本草綱目拾遺盛推其治痢之功惟其味至為苦寒苦能燥濕寒能泄熱服之而去濕熱無疑其服法用囫圇者以龍眼肉包一錢空心吞下或去油作丸外加導滯行氣之藥食前空心服此因餘邪留匿於腸中曲折之處非此不能到達病所也理中湯溫補脾陽而未免助熱歸脾湯養血濡脾而不免助濕其不能收效者或此故歟以愚見懸揣之閣下病經兩載脾胃必傷眉批能納而不能運病在脾能運而不能納病在胃刻下既得暫止無論內伏之濕積清與不清總當以補中益氣為主方其中有濕熱未清或復作病或糞後有余垢如紅垢病在血分於煎劑外間服駐車丸二錢如白垢病在氣分凡尋常休息痢可望痊愈其或久痢而致滑脫者當兼固澀久痢而傷腎臟者當用溫補此須有見證可據非憑空懸擬所可作為定論也病未一診路隔千里而談病議治娓娓不已閣下得毋笑其紙上談兵猶是書生結習乎特以夙承摯愛也又不能奮飛至前一片愚悃用敢以一知半解藉作芻議之獻涉筆所至亦不自覺其狂直者伏冀採擇而訓正之幸甚幸甚咳嗽病原虛實證治通論內經咳論備詳五臟六腑之咳而推其病原則括之以內外合邪一語是內經所論只有外感之寒咳而未及乎他也金匱以咳嗽分列兩門其與肺痿肺癰並論者多痰壅熱鬱之證與痰飲同論者多水停氣逆之證是金匱所論亦只有痰熱飲寒之咳而未及乎他也厥後千金外臺以及宋元諸家推究病原詳求治法由六淫而及七情則有志火刑金之咳由外感而及內傷則有虛熱爍肺之咳循實課虛愈推愈細咳嗽之治蓋至是始無餘蘊矣溯自醫學之興黃農以來四五千年風氣遞遷病情各異有古書所載而今無其病者亦有今人所病而古無其名者甚或同此一症而致病之由古今不同因之病候之傳變方藥之補瀉古與今有迥乎不同者蓋雜症中往往有之而於咳嗽一證為尤甚間嘗比而論之內經金匱所論咳嗽之實證也後賢所論或先實後虛或標實本虛咳嗽之虛證也古人起居有常飲食清淡所病者多外感而少內傷晚近以來嗜欲日多凡飲食之醞釀虛火之薰灼皆足以生痰而致咳故今人所患有濁淡壅肺而化熱者有陰虛火炎而傷肺者有天時炎敲而爍金者如葦莖湯瓊玉膏以及清燥救肺諸法後賢所著皆切於用而不可廢設以今人所患咳嗽之虛證而必執金匱之法動輒以麻桂青龍從事焉其不至於液涸金枯而敗者蓋亦解矣且夫病原者論治之要旨也虛實者論治之通義也何獨於咳嗽而辨之則以咳嗽一症病原有虛實之不同論治有古今之各異執金匱之法者方自許取法之高而習近時之治者又自恃認病之切夫以飲寒之實證而以參地麥味滋斂其肺則邪錮不達徐洄溪嘗齗齗致辨矣以火炎之虛咳而以麻辛薑桂溫理其肺則金涸液枯喻西昌又大聲疾呼矣二者交譏果孰得而孰失乎要在通古今以辨明其虛實而已是故論治病者固當推究其病原而治咳嗽者尤必先明夫虛實咳嗽續論愚嘗謂咳嗽一證古今不同治法各異已於前論中暢其義矣而世運之變遷人事之澆漓於古今所以不同之故意猶未盡敢復即前論而申言之考咳嗽二字前人謂有聲無痰曰咳有痰無聲曰嗽有痰有聲曰咳嗽內經無痰字其咳論中亦不及嗽字即他處咳嗽二字並舉者亦不多見至金匱備論咳嗽其治法亦詳於飲而略於痰至宋元以後始專立治痰之方可見上古有飲而無痰漢時猶飲多而痰少至近時而痰之為病始多也夫痰與飲同出一原所謂飲者積水也所謂痰者蓋即所積之水而熬煉以成者也上古之人淡泊無為內火不生故無痰中古以後嗜欲漸多情志之火熏於肺飲食之毒蒸於胃其始也爍飲而為痰其繼也因痰而壅熱蓋咳嗽之病變多矣其尤甚者腎陰告損水衰不能制火火炎則金傷金傷則乾咳蓋至是而咳嗽門中且多不治之症矣此非古今來病原治法之一大變哉而愚則更有進焉者自元季以來煙草日行日盛其氣隨呼吸以出入日引日長熏爍肺津變而為痰試觀吸煙日久之人無不痰多作咳者謂非煙氣之所致歟至近二百年鴉片盛行其煙氣較和而煙毒更盛其性不至熏熬而兼能吸聚年久癮深者類能聚津液而為痰痰愈多而咳愈甚而生痰致咳之原更日出而無窮矣夫咳嗽之病多由乎痰而生痰之原古與今既若是其變遷也而謂論治者猶可執古法而不知化裁哉故愚嘗謂治病當變通夫古者惟咳嗽為尤要云肝病證治條例肝屬木得春令生髮之氣喜條達而惡郁遏鬱則怫其性情而為肝氣之病木性化風風木不和則上越而為肝風之病木能生火木鬱火旺敗攻竄而為肝火之病此三者肝病之大宗也而均有虛實之等則今將三病分別虛實調治之法條例於後凡治肝實之病一曰泄肝氣二曰疏肝瘀三曰瀉肝火四曰祛肝寒五曰鎮肝逆此五者治肝之有餘也此外肝氣逆於肺則有清金平木一法肝木內克於脾則有實土御木一法凡肝實者宜用此法凡治肝虛之病一曰扶肝氣二曰養肝血三曰斂肝陰四曰熄肝陽此四者治肝不足之病也此外有水不涵木者更有滋水生木一法乃乙癸同源之意也凡肝虛者宜用此法一曰肝氣之證如兩脅板痛裡氣攻撑此肝氣鬱於本經宜用疏肝法並通絡理氣如金鈴子玄胡索沉香木香青皮鬱金香附蘇梗如氣病日久郁及血絡者宜疏瘀通絡如歸鬚桃仁紅花牛膝丹參乳香玄胡旋覆花如脘中撑痛嘔吐酸水肝木犯胃者宜泄木和胃如左金丸二陳加白芍砂蔻仁木香沉香如肝氣內逆大痛大吐四肢厥冷此為肝厥宜烏梅丸加減如脘腹脹滿木氣干於脾土者宜培土泄木如六君子加木香砂仁雞內金白芍香櫞木香如肝氣兼挾濕痰濁積壅阻結塊而成脹者宜於泄木中兼化濁積如小溫中丸合平胃二陳配用如肝氣上逆於肺咳促哽噎者宜清金平木如旋覆花代赭前胡百合丹參紫菀枳殼鬱金枇杷葉紅梅花緑梅花如少腹脹痛肝氣鬱陷於下者宜疏木達郁如柴胡川芎歸身芍藥青皮木瓜烏藥沉香吳萸橘核香附玄胡如氣滯兼阻及血而少腹結塊作痛者宜疏通瘀滯山稜莪朮牛膝紅花桃仁楂炭之類其痛而作塊者當參癥瘕例治之此外更有營血不足肝脾不和而作痛者病勢徐緩而延綿不止者宜養肝止痛如歸脾湯加疏肝之品或建中湯加歸身木香之類呆翁按不論室女婦人體弱中虛情志抑鬱經行腹痛諸藥罔效往往用歸脾原方覆杯即愈此蓋木失涵養使然也一曰肝風之證亦有虛實兩種而虛者為多木鬱則化火火鬱則生風此實症也血虛則木燥木燥則生風此虛證也肝風上升於頭者巔痛頭暈耳鳴目眩宜羚羊角石決明明天麻滁菊夏枯草丹皮黑料豆刺蒺藜鉤鉤有內風燔於胃口煩擾不寐嘈雜嘔酸宜左金二陳木瓜烏梅竹茹枳實白芍棗仁有外感經絡者四肢痙掣麻木牽強宜羚羊角刺蒺藜當歸白芍絲瓜絡木瓜以上皆肝鬱生風治法是肝風之實證也如肝血不足而兼生火動風者當於前法中參入滋肝之品如歸芍二地阿膠龜版牡蠣梔子沙苑桑椹天麻首烏料豆等柔熄之品甚則眩暈痙掣肢厥多汗急宜三甲復脈大小定風珠參入珠粉等以熄風固脫一曰肝火之證有上越巔頂者為頭痛目赤耳聾顴紅宜羚羊角黑梔杭菊夏枯草有竄入血絡者為咯血衄血牙宣舌衄等症宜於清火方中加入犀角鮮地玄參赤芍丹皮銀花有擾及心包者為癲狂不寐怔忡驚悸等症宜用犀角川連龍齒牡蠣磁石硃砂金銀箔鐵落真珠竹葉山梔丹皮青黛棗仁有燔及中焦而嘈雜吐酸者宜川連山梔竹茹夏枯草若胃液被爍而煩渴善飢者苦寒慎用宜用甘寒竹葉石膏加西洋參石斛二冬二地知母白芍有注於下焦淋濁遺泄便祕溺澀在婦人則見經水不調帶下不止等證者宜龍膽瀉肝當歸龍薈大黃黃連黃柏玄參牡蠣木通山梔丹皮此外有肝臟本虛精神困頓體有肝風肝氣之病不能再投疏泄之品以耗正氣者只可培養以固本宜二地歸芍杞子蓯蓉阿膠龜版菟絲子沙苑烏梅等以養肝陰呆翁按凡木勝之人中土弱者居多木固宜滋宜柔然土亦須兼顧蓋胃最惡濕任用甘寒滋柔之品而忘其妨胃之患久進之後中陽漸淚尋至胃呆不納神疲體倦言微氣弱中原板蕩命火將傾病者寧有幸存之望乎若夫肝陽虧者適與上述諸症背道而馳是則宜以鹿角阿膠黃耆葫蘆巴蓯蓉杜仲萸肉川芎當歸五味羊肉東洋參大小茴乾薑等以扶益肝陽晚近以來有婦女肝氣下注足膝每發則痠痛麻木不能步履此證前人未有論及者惟顧練江備論及之名曰女腳氣由於脾氣先虛肝氣因而下陷若用通絡下墜破氣之品則氣愈虛而病愈重治當以健脾為主佐以疏肝如六君異功歸脾等方隨證加減甚則用理中腎氣之類以補火生土其證詳載瘍醫大全二十六卷中醫案痢疾門史痢垢數日不止狀如休息腸腑中積垢未淨必須疏化但脈象軟數清晨氣滯臟真暗傷當以溫補為主佐以疏通可也潞黨參沙松炙甘草歸身炭砂仁野於術炒黃四神丸杜仲酒炒荷葉蒂炮薑炭廣皮懷山藥另上桂心五分淡乾薑五分酒炙大黃炭一錢廣木香五分為末丸分三服陳左由瘧轉痢經腑交病所下垢膩如痰者甚多神倦肢清脈弱舌滑苔色白燥脾陽與胃陰兩受重傷而痰氣尚阻而未暢擬仿理中法加味於術炙草紅棗白芍土炒麥冬肉炒黑太子參薑半夏茯苓炒枳實煨木香炮薑橘紅西洋參米湯拌炒桂枝朱左濕熱積滯阻窒氣機滯下痛痢垢下兼紅舌苔濁膩當疏濁清營煨木香小川朴川芎炭楂炭枳殼淡芩酒炒桔梗紅曲米炭豆卷赤勺酒炒歸身炭鮮藕煎湯代水楊左瓜積傷中腹痛泄瀉將及一月漸覺氣墜不爽微有紅垢此脾營下陷欲作痢疾也舌苔白膩脈象細數氣弱邪戀恐其淹纏姑與溫通炒本山術赤苓小川芎炭砂仁炮薑炭枳殼歸尾楂炭廣皮桔梗廣木香荷葉蒂二診腹痛滯痢得冷則劇此脾氣虛寒之象診脈左弱右弦中宮並有暑濕氣弱邪戀最易淹纏擬方溫中疏邪野於術川厚朴桔梗焦六曲乾薑炭砂仁炒枳殼通草煨木香連皮苓廣藿梗煨薑荷葉三診濕邪阻滯緣脾氣衰弱不能托邪外達肢倦力乏納穀不舒氣弱邪滯難取速效姑擬溫脾疏濕俾外達為佳本山術乾薑炭砂仁廣皮炒枳殼於術川朴茯苓皮豆卷炙雞金通草焦六曲茵陳桔梗香稻葉四診中氣未化濕邪未淨仍宜芳香疏化兼與分利本山術茯苓皮茵陳半夏於術豆卷砂仁通草川朴藿梗廣皮煨薑荷葉趙左瘧發於夜而有盜汗病邪本在陰分更兼暑熱積滯蒸蘊營分發為紅痢法當和營疏邪表裡兼治炒歸身細柴胡酒炒淡芩川朴川芎炭丹皮炭桔梗酒炒東白芍炒枳殼煨木香楂炭紅花荷葉劉左久痢不已肝脾營氣受傷於是肝木失疏達之性脾土少健運之力當臍及脘左塊痛納穀少而不暢氣機阻窒於中滯陷於下營分中餘邪至今未能盡化脈象虛細弱數正虛邪戀奏效頗難姑與疏肝運脾冀其調暢乃佳於術酒炒淡芩炙雞內金楂炭歸身炒黑桂枝炒枳殼醋炒青皮土炒白芍煨木香桔梗炮薑炭蜜炙鮮藕方中氣虛寒由氣分傷及血分痢下瘀紫血水肢冷腹痛脈細弦弱擬建中法佐以溫營暢氣東白芍桂枝六分煎汁炒煨木香小生地炒鬆楂肉炭炙草制附片砂仁炒穀麥芽歸身炒黑於術炙雞內金馬血痢久而不止脾氣與胃津俱傷面浮色萎舌質無苔有由來也刻下因積滯面增腫滿更因感冒而加咳嗽以致病情錯雜若論病以痢為本以痰為標論治法當先治咳而後治痢以肺為嬌臟易傷治痢之藥多所窒礙故也南沙參杏仁歸身炭桑皮萊蔔子炭桔梗淡芩炒黑煨木香桑葉砂仁前胡赤芍酒炒炒枳殼茯苓皮通草冬瓜子龐右據述脹痛在於下部此由肝氣乘久痢下虛之隙注陷於少腹故脹痛甚於下而泄痢亦增劇耳紅白雜垢及從前暑濕餘邪留於腸腑未盡清泄也參鬚不能進者緣肝氣內橫逆於胃口故服之轉增脹滿如和入平肝藥中即無妨也惟飲食能進則胃氣可以支持擬用疏肝為主佐以寬暢調氣之法於術醋炒青皮醋炒延胡烏藥橘絡土炒白芍酒炒金鈴子肉青廣木香醋炒枳殼歸身小茴香二分煎汁炒西洋參米拌炒黃去米乾荷葉白檀香陳米蛀屑炒焦色橘核炒便血門吳便血數日不止濕熱之留於營分者由此疏泄惟氣機不化脘氣不舒宜清泄營吩疏通中氣豆豉桔梗小生地炭白芍淡芩炒枳殼煨木香炒歸身丹皮炭防風根炭綿耆荷葉炭藕吳腸風失血甚多濕熱下注使然法宜清泄細生地炭荊芥炭槐米炭歸身炭晚蠶沙側柏葉炭丹皮炭茜根炭陳阿膠地榆炭一錢研末炒藕節炭再診便血甚多氣墜血注前與清泄不效擬固氣攝營佐以潤腸泄熱黨參細生地炭槐米炭防風根炭黃耆丹皮炭柏子仁霜絹包歸身荊芥炭阿膠蒲黃粉拌炒另臟連丸三錢趙便血頗多肝脾營氣大傷脈虛細神倦乏力當從肝脾清攝黃耆槐米炭阿膠地榆炭一錢研末拌抄枳殼醋炒大生地炒鬆丹皮炭黑穭豆衣廣皮歸身炭茜根炭白芍側柏葉炭炒焦荷葉薑先患便血腹中滯痛不爽此濕熱傷營之病溫之澀之便血稍止而濕熱內踞中氣受傷漸至脘腹脹滿刻診脈象弦數舌苔黃濁法當清泄肝脾勿容溫補助邪也煨木香枳殼醋炒酒炒淡芩桔梗酒炒赤白芍槐米炭歸身炭防風根炭丹皮炭紅曲米炭川芎炒焦荷葉另小溫中丸每服三錢孟便血不已氣墜肛脫自屬氣虛下陷宜用升補之法但左脈弦數腹中未和舌苔帶濁仍有濕熱留戀濁痰上壅宜先疏化青鹽半夏炒枳殼茯苓茜草根橘紅煨廣木香歸身炭淡芩炒黑酒炒東白芍槐米炭丹皮炭炒焦荷葉藕節炭肝氣門肝木犯胃則嘔犯脾則脹犯肺則氣逆木病久必歸中土腹脹納艱大便不時溏泄乃中氣更傷之病動作氣逆肝氣上逆於肺故亦有偏臥之候久病正虛未便專用疏泄擬和胃健脾兼佐泄木調氣之法法半夏生於術雞內金東白芍小青龍廣鬱金奎砂仁刺蒺藜左牡蠣旋覆花川百合檀降香枇杷葉木蝴蝶肝木犯胃痛嘔而脹發必五日甚則形寒汗出脈象左手弦長關部獨大肝木自鬱於本宮氣侵及胃設使胃病及脾則脹增痛減病情更重矣姑先泄木安胃冀得痛嘔兩平細川連五分吳萸二分炒製半夏醋炒一錢半小青皮醋炒一錢半川楝子酒炒一錢半延胡醋炒一錢東白芍土炒二錢陳木瓜酒炒一錢黑山梔薑汁炒二錢紫蘇細梗八分桂丁子三分研末沖蔻仁一粒研末沖竹二青薑汁炒一錢五分陳香櫞皮一錢五分脈象左弦右弱肝氣上逆胃氣下降寒熱雖退而撑痛嘔脹舌中黃厚時或吐紅胃氣不得下行當與泄肝和胃川連吳萸三分炒鹽半夏青皮金鈴子延胡廣鬱金石斛瓜蔞皮枳實茯神檀降香竹茹撑痛當脘旁及左脅痛甚則嘔吐酸濁脈象細弦病緣肝木犯胃挾中焦之痰濁上逆不降營衛相忤則形寒裡熱風木浮擾則耳鳴頭眩而總以肝病為主腦擬方疏肝安胃暢氣化痰東白芍土炒一錢半桂枝尖四分小青皮醋炒一錢半薑半夏一錢半新薈皮一錢細川連吳萸二分同炒四分淡乾薑鹽水炒四分白茯苓三錢白苡米薑汁炒三錢瓦楞子殼醋炒六錢竹二青一錢五分陳佛手八分方按再加石決明以熄風木則更周到肝氣撑痛則嘔數月不止氣阻瘀窒經水不行兼感微邪營衛俱病故寒熱日作舌色干絳苔色干黃腐蝕胃陰為裡熱所灼未可再投溫燥擬內養胃陰外和營衛兼佐泄肝調氣之法冀陰液得復乃可著手洋參麥冬川石斛白芍桂枝炒丹皮白薇金鈴子延胡青皮細川連吳萸二分